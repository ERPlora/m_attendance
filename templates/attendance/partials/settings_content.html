<div x-data="attendanceSettingsApp()" class="p-4 space-y-6">

    <!-- General Settings -->
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">{{ _("Attendance Settings") }}</h2>
        </div>
        <div class="card-body space-y-4">

            <h3 class="text-sm font-semibold text-muted uppercase tracking-wide">{{ _("Clock-in Options") }}</h3>
            <div class="space-y-3">
                <label class="flex items-center gap-3">
                    <input type="checkbox" class="toggle" x-model="form.require_photo">
                    <span>{{ _("Require Photo on Clock-in") }}</span>
                </label>
                <label class="flex items-center gap-3">
                    <input type="checkbox" class="toggle" x-model="form.allow_manual_entry">
                    <span>{{ _("Allow Manual Entry") }}</span>
                </label>
            </div>

            <hr class="border-base-300">

            <h3 class="text-sm font-semibold text-muted uppercase tracking-wide">{{ _("Thresholds") }}</h3>
            <div class="space-y-3">
                <div class="flex items-center gap-3">
                    <label class="text-sm font-medium min-w-48">{{ _("Late Threshold (minutes)") }}</label>
                    <input type="number" class="input input-sm" style="width:100px" min="1" max="120"
                        x-model.number="form.late_threshold_minutes">
                </div>
                <div class="flex items-center gap-3">
                    <label class="text-sm font-medium min-w-48">{{ _("Early Departure (minutes)") }}</label>
                    <input type="number" class="input input-sm" style="width:100px" min="1" max="120"
                        x-model.number="form.early_departure_minutes">
                </div>
                <div class="flex items-center gap-3">
                    <label class="text-sm font-medium min-w-48">{{ _("Auto Clock-out (hours)") }}</label>
                    <input type="number" class="input input-sm" style="width:100px" min="1" max="24"
                        x-model.number="form.auto_clock_out_hours">
                </div>
            </div>

            <hr class="border-base-300">

            <button class="btn color-primary" @click="saveSettings()" :disabled="saving">
                <span x-show="!saving">{{ icon("save-outline", css_class="mr-2") }} {{ _("Save Settings") }}</span>
                <span x-show="saving" class="loading loading-sm"></span>
            </button>
        </div>
    </div>
</div>

<script nonce="{{ csp_nonce }}">
function attendanceSettingsApp() {
    return {
        saving: false,
        form: {
            require_photo: {{ 'true' if settings.require_photo else 'false' }},
            allow_manual_entry: {{ 'true' if settings.allow_manual_entry else 'false' }},
            late_threshold_minutes: {{ settings.late_threshold_minutes }},
            early_departure_minutes: {{ settings.early_departure_minutes }},
            auto_clock_out_hours: {{ settings.auto_clock_out_hours }},
        },

        async saveSettings() {
            this.saving = true;
            try {
                const resp = await fetch('/m/attendance/settings/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(this.form),
                });
                const data = await resp.json();
                if (data.success) {
                    htmx.trigger(document.body, 'showMessage', {level: 'success', text: '{{ _("Settings saved") }}'});
                } else {
                    htmx.trigger(document.body, 'showMessage', {level: 'error', text: data.error || 'Error'});
                }
            } catch (e) {
                console.error(e);
            } finally {
                this.saving = false;
            }
        },
    }
}
</script>
